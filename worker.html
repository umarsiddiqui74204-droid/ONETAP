
<!DOCTYPE html>
<html>
<head>
<title>Join OneTap</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{font-family:Arial;padding:20px;background:#f4f4f4;}
.box{background:white;padding:20px;border-radius:10px;max-width:600px;margin:auto;}
input,select{width:100%;padding:10px;margin-top:10px;}
button{width:100%;padding:12px;margin-top:15px;}

<script>
function joinWorker(){

let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;
let skill=document.getElementById("skill").value;
let city=document.getElementById("city").value;
let area=document.getElementById("area").value;

let message=
"🔧 NEW WORKER REGISTRATION%0A%0A"+
"👤 Name: "+name+"%0A"+
"📞 Phone: "+phone+"%0A"+
"🛠 Skill: "+skill+"%0A"+
"🏙 City: "+city+"%0A"+
"📍 Area: "+area;

window.open(
"https://wa.me/919579810395?text="+message,
"_blank"
);
}
</script>

</style>
</head>
<body>

<div class="box">

<h2>Join OneTap as Service Provider</h2>

<input type="text" id="name" placeholder="Full Name">
<input type="tel" id="phone" placeholder="Phone Number">

<select id="skill">
<option>Electrician</option>
<option>Plumber</option>
<option>RO Technician</option>
<option>AC Repair</option>
<option>Carpenter</option>
</select>

<input type="text" id="city" placeholder="City">

<input type="text" placeholder="Area">

<button onclick="joinWorker()">
Register
</button>
</div>

</body>
</html>
