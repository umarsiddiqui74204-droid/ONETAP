<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book Service - OneTap</title>

<style>
body{
font-family:Arial;
background:#f4f4f4;
padding:20px;
}

.container{
max-width:500px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
}

input,select,textarea{
width:100%;
padding:10px;
margin-top:10px;
margin-bottom:15px;
}

button{
background:#0066ff;
color:white;
padding:12px;
border:none;
width:100%;
}
</style>
</head>

<body>

<div class="container">

<h2>Request a Service</h2>

<form>

<input type="text" placeholder="Full Name">

<input type="tel" placeholder="Phone Number">

<input type="text" placeholder="Village / Area">

<select>
<option>Electrician</option>
<option>Plumber</option>
<option>RO Service</option>
<option>AC Repair</option>
<option>Carpenter</option>
</select>

<textarea placeholder="Describe your problem"></textarea>

<button type="submit">
Submit Request
</button>

</form>

</div>
<select>
<option>Select State</option>
<option>Uttar Pradesh</option>
</select>

<select>
<option>Select City</option>
<option>Pratapgarh</option>
<option>Prayagraj</option>
<option>Lucknow</option>
<option>Kanpur</option>
</select>

<input type="text" placeholder="Area / Locality">
</body>
</html>
